name: Keep Render Backend Alive

on:
  schedule:
    # Run every 10 minutes Mon-Fri during IST market hours (03:00-12:30 UTC = 08:30-18:00 IST)
    - cron: '*/10 3-12 * * 1-5'
  workflow_dispatch:   # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        run: |
          echo "Pinging at $(date)"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            https://options-bot-backend.onrender.com/health)
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✅ Backend is alive"
          else
            echo "⚠️ Backend returned $STATUS"
          fi
